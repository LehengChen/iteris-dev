name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Test
        run: pytest
      - name: Check shell scripts
        run: bash -n install.sh scripts/deploy.sh

  ui:
    name: Dashboard UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            src/iteris/ui/server/package-lock.json
            src/iteris/ui/client/package-lock.json
      - name: Server typecheck
        working-directory: src/iteris/ui/server
        run: |
          npm ci
          npx tsc --noEmit
      - name: Client build
        working-directory: src/iteris/ui/client
        run: |
          npm ci
          npm run build
